                {confirmLabel}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // ЧАНК 5: ПРЕДУПРЕЖДЕНИЕ О СОХРАНЁННЫХ ДАННЫХ
    // ─────────────────────────────────────────────

    // Проверяет, есть ли в сохранённых данных что-то ценное
    function hasMeaningfulData(saved) {
      if (!saved) return false;
      const hasCode    = Boolean(saved.meta?.respondentCode?.trim());
      const hasAnswers = Object.values(saved.answers || {}).some(v => String(v).trim().length > 0);
      const hasScreen  = Boolean(saved.screening?.caseLastYear);
      return hasCode || hasAnswers || hasScreen;
    }

    // Баннер «Найдено незавершённое интервью»
    // onContinue  — закрыть баннер, продолжить
    // onNewInterview — открыть ConfirmModal → очистить
    function SavedDataBanner({ savedMeta, onContinue, onNewInterview }) {
      const label = savedMeta?.respondentCode
        ? `Респондент: ${savedMeta.respondentCode} · Дата: ${savedMeta.date || '—'}`
        : `Дата: ${savedMeta?.date || '—'}`;

      return (
        <div className="border-b border-amber-200 bg-amber-50 px-4 py-3">
          <div className="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-2 text-sm text-amber-800">
              <span className="text-base">💾</span>
              <span>
                <strong>Найдено незавершённое интервью.</strong>{' '}
                <span className="text-amber-700">{label}</span>
              </span>
            </div>
            <div className="flex gap-2">
              <button
                onClick={onContinue}
                className="rounded-lg border border-amber-300 bg-amber-100 px-3 py-1.5 text-xs font-semibold text-amber-900 transition hover:bg-amber-200"
              >
                Продолжить
              </button>
              <button
                onClick={onNewInterview}
                className="rounded-lg bg-amber-600 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-amber-700"
              >
                Начать новое
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    // ЧАНК 6: СБРОС ANSWERS ПРИ СМЕНЕ ФИЛЬТРА
    // ─────────────────────────────────────────────

    // Возвращает новый объект answers без кейсовых ответов
    function clearCaseAnswers(answers) {
      const clean = { ...answers };
      CASE_IDS.forEach(id => delete clean[id]);
      return clean;
    }

    // Умный updateScreening: если фильтр ставится в 'no' → чистим кейсовые ответы
    // Принимает setState из основного компонента
    function makeUpdateScreening(setState) {
      return (field, value) => {
        setState(prev => {
          const newScreening = { ...prev.screening, [field]: value };

          // Сброс кейсовых ответов при любом «нет» в фильтре
          const caseWillDisappear =
            (field === 'caseLastYear' && value === 'no') ||
            (field === 'olderCase'   && value === 'no');

          return {
            ...prev,
            screening: newScreening,
            answers: caseWillDisappear
              ? clearCaseAnswers(prev.answers)
              : prev.answers,
          };
        });
      };
    }

    // При экспорте — не включаем ответы на вопросы, которых нет в visibleQuestions
    function filterExportAnswers(answers, visibleQuestions) {
      const visibleIds = new Set(visibleQuestions.map(q => q.id));
      return Object.fromEntries(
        Object.entries(answers).filter(([id]) => visibleIds.has(id))
      );
    }

    // ─────────────────────────────────────────────
    // ЧАНК 7: COMPLETION STATS (без магических чисел)
    // ─────────────────────────────────────────────

    // visibleQuestions — список вопросов, видимых в текущей сессии
    // state — полное состояние формы
    function calcCompletionStats(visibleQuestions, state) {
      // Обязательные вопросы среди видимых
      const requiredQs = visibleQuestions.filter(q => q.required);

      const answeredQs = requiredQs.filter(q => {
        if (q.id === 'Q2')  return Boolean(state.screening.caseLastYear);
        // Q2A — required: false, сюда не попадёт
        return Boolean((state.answers[q.id] || '').trim());
      }).length;

      // Обязательные поля summary (из REQUIRED_SUMMARY_FIELDS, без хардкода)
      const answeredSummary = REQUIRED_SUMMARY_FIELDS.filter(field => {
        const v = state.summary[field];
        return Boolean(String(v ?? '').trim());
      }).length;

      const total     = requiredQs.length + REQUIRED_SUMMARY_FIELDS.length;
      const completed = answeredQs + answeredSummary;

      return {
        completed,
        total,
        percent: total > 0 ? Math.round((completed / total) * 100) : 0,
      };
    }

    // ─────────────────────────────────────────────
    // ЧАНК 8: SANITIZE FILENAME + DOWNLOAD HELPER
    // ─────────────────────────────────────────────

    // Превращает строку в безопасное ASCII имя файла
    // «R-01 Иванов» → 'R-01_Ivanov' (транслит не нужен — просто strip)
    function sanitizeFilename(str) {
      return String(str || 'unknown')
        .trim()
        .replace(/\s+/g, '_')               // пробелы → _
        .replace(/[^\w\-_.]/g, '')          // убрать всё нелатинское и спецсимволы
        .replace(/_+/g, '_')               // схлопнуть двойные __
        .slice(0, 40)                       // ограничить длину
        || 'unknown';
    }

    // Генерирует имя файла для экспорта
    function makeFilename(respondentCode, date, ext) {
      const code = sanitizeFilename(respondentCode || 'unknown');
      const d    = sanitizeFilename(date || localToday());
      return `prizma_interview_${code}_${d}.${ext}`;
    }

    // Базовый download helper — FileSaver.js (гарантированно правильное имя файла)
    function downloadFile(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
      window.saveAs(blob, filename);
    }

    // ─────────────────────────────────────────────
    // ЧАНК 9: UI КОМПОНЕНТЫ
    // ─────────────────────────────────────────────

    const BADGE_STYLES = {
      blue:    'bg-blue-50 text-blue-700 border-blue-200',
      amber:   'bg-amber-50 text-amber-700 border-amber-200',
      slate:   'bg-slate-100 text-slate-600 border-slate-200',
      emerald: 'bg-emerald-50 text-emerald-700 border-emerald-200',
      violet:  'bg-violet-50 text-violet-700 border-violet-200',
      red:     'bg-red-50 text-red-700 border-red-200',
    };

    function SectionBadge({ children, color = 'blue' }) {
      return (
        <span className={`inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold ${BADGE_STYLES[color] || BADGE_STYLES.blue}`}>

        </span>
      );
    }

    function Card({ children, className = '' }) {
      return (

          {children}
        </div>

    function TextareaField({ label, value, onChange, placeholder, rows = 4, helper }) {
      return (

          />
        </div>

    }

    function InputField({ label, value, onChange, type = 'text', placeholder }) {
      return (
        <div>
          <label className="mb-1.5 block text-sm font-medium text-slate-800">{label}</label>
          <input
            type={type}
            value={value}
            onChange={e => onChange(e.target.value)}
            placeholder={placeholder}
            className="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm text-slate-900 outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 placeholder:text-slate-400"
          />
        </div>
      );
    }

    // Универсальная кнопка-переключатель
    function ToggleButton({ value, active, onClick, activeClass = 'border-blue-600 bg-blue-600 text-white', children }) {
      return (
        <button
          type="button"
          onClick={() => onClick(value)}
          className={`rounded-lg border px-4 py-2 text-sm font-medium transition ${
            active
              ? activeClass
              : 'border-slate-300 bg-white text-slate-700 hover:border-slate-400'
          }`}
        >
          {children}
        </button>
      );
    }

    // ─────────────────────────────────────────────
    // ТОЧКА МОНТИРОВАНИЯ — демо чанка 9
    // ─────────────────────────────────────────────

    // ─────────────────────────────────────────────
    // ЧАНКИ 10.1 и 10.2: ГЛАВНЫЙ КОМПОНЕНТ APP (Хедер + Сайдбар)
    // ─────────────────────────────────────────────

    function App() {
      // Трек: s2s или b2s (хранится отдельно)
      const [track, setTrack] = useState(() => {
        try { return localStorage.getItem('prizma_custdev_track') || 's2s'; }
        catch { return 's2s'; }
      });
      const [showTrackModal, setShowTrackModal] = useState(null); // null | 's2s' | 'b2s'

      const config = SURVEY_CONFIGS[track];

      // Инициализация из localStorage (по ключу трека)
      const [state, setStateRaw] = useState(() => {
        try {
          const saved = localStorage.getItem(config.storageKey);
          return saved ? JSON.parse(saved) : defaultState;
        } catch {
          return defaultState;
        }
      });

      // Локальные стейты для UI
      const [saveStatus, setSaveStatus] = useState('Автосохранение включено');
      const [showResetModal, setShowResetModal] = useState(false);
      const [copyStatus, setCopyStatus] = useState('');

      // При первом рендере проверяем, были ли реально полезные сохраненные данные.
      const [showSavedBanner, setShowSavedBanner] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem(config.storageKey));
          return hasMeaningfulData(saved);
        } catch {
          return false;
        }
      });

      // Автосохранение (по ключу трека)
      useEffect(() => {
        try {
          localStorage.setItem(config.storageKey, JSON.stringify(state));
          localStorage.setItem('prizma_custdev_track', track);
          setSaveStatus('Сохранено локально');
          const timer = setTimeout(() => setSaveStatus('Автосохранение включено'), 1500);
          return () => clearTimeout(timer);
        } catch {
          setSaveStatus('Ошибка сохранения');
        }
      }, [state, track]);

      // Хелперы изменения стейта
      const updateMeta = (field, value) => {
        setStateRaw(p => ({ ...p, meta: { ...p.meta, [field]: value } }));
      };
      const updateSummary = (field, value) => {
        setStateRaw(p => ({ ...p, summary: { ...p.summary, [field]: value } }));
      };
      const updateAnswer = (id, value) => {
        setStateRaw(p => ({ ...p, answers: { ...p.answers, [id]: value } }));
      };
      const updateScreening = makeUpdateScreening(setStateRaw);

      const toggleArrayValue = (arr, val) => arr.includes(val) ? arr.filter(i => i !== val) : [...arr, val];

      const handleResetForm = () => {
        setStateRaw(defaultState);
        setShowResetModal(false);
        setShowSavedBanner(false);
      };

      // Переключение трека
      const handleTrackSwitch = (newTrack) => {
        if (newTrack === track) return;
        if (hasMeaningfulData(state)) {
          setShowTrackModal(newTrack);
        } else {
          doTrackSwitch(newTrack);
        }
      };
      const doTrackSwitch = (newTrack) => {
        setTrack(newTrack);
        setShowTrackModal(null);
        setShowSavedBanner(false);
        // Загружаем данные нового трека из localStorage или сбрасываем
        try {
          const saved = localStorage.getItem(SURVEY_CONFIGS[newTrack].storageKey);
          setStateRaw(saved ? JSON.parse(saved) : defaultState);
          if (saved && hasMeaningfulData(JSON.parse(saved))) {
            setShowSavedBanner(true);
          }
        } catch {
          setStateRaw(defaultState);
        }
      };

      // Вычисление видимых вопросов из текущего конфига (Memo)
      const needsFallbackQuestion = state.screening.caseLastYear === 'no';
      const caseExists = state.screening.caseLastYear === 'yes' || 
                         (state.screening.caseLastYear === 'no' && state.screening.olderCase === 'yes');

      const visibleQuestions = useMemo(() => {
        const qs = config.questions;
        const list = qs.filter(q => q.stage === 'base');
        if (needsFallbackQuestion) list.push(...qs.filter(q => q.stage === 'fallback'));
        if (caseExists)            list.push(...qs.filter(q => q.stage === 'case'));
        list.push(...qs.filter(q => q.stage === 'concept'));
        return list;
      }, [needsFallbackQuestion, caseExists, track]);

      const groupedQuestions = useMemo(() => ({
        interview: visibleQuestions.filter(q => q.stage !== 'concept'),
        concept:   visibleQuestions.filter(q => q.stage === 'concept'),
      }), [visibleQuestions]);

      // Статистика (прогресс)
      const stats = calcCompletionStats(visibleQuestions, state);

      // Экспорт и сборка отчёта
      const buildReportObject = () => {
        return {
          exportDate: new Date().toISOString(),
          track: track,
          trackLabel: config.label,
          meta: state.meta,
          screening: state.screening,
          answers: filterExportAnswers(state.answers, visibleQuestions),
          summary: state.summary,
          stats
        };
      };

      const buildReportText = () => {
        let txt = `=============================================\n`;
        txt += `ТРЕК: ${config.label}\n`;
        txt += `ИНТЕРВЬЮ: ${state.meta.respondentCode || 'Не указан'} (${state.meta.date})\n`;
        txt += `=============================================\n\n`;

        txt += `ОДНОЙ СТРОКОЙ: ${state.summary.caseOneLiner || '—'}\n`;
        txt += `КАЧЕСТВО: ${state.summary.interviewQuality || '—'}\n\n`;

        txt += `[ВЫВОДЫ]\n`;
        txt += `Боль: ${state.summary.mainPain || '—'}\n`;
        txt += `Инсайт: ${state.summary.mainInsight || '—'}\n`;
        txt += `Где ломается: ${state.summary.breakpoint || '—'}\n`;
        txt += `Теги: ${state.summary.painTags.join(', ') || '—'}\n`;
        txt += `Цитаты:\n${state.summary.strongQuotes || '—'}\n\n`;

        const exportedAnswers = filterExportAnswers(state.answers, visibleQuestions);

        txt += `[ОТВЕТЫ НА ВОПРОСЫ]\n`;
        visibleQuestions.forEach(q => {
          txt += `\nQ: ${q.question}\n`;
          if (q.type === 'caseFilter') {
            txt += `A: ${state.screening.caseLastYear === 'yes' ? 'Да' : state.screening.caseLastYear === 'no' ? 'Нет' : '—'}\n`;
          } else if (q.type === 'olderCaseFilter') {
            txt += `A: ${state.screening.olderCase === 'yes' ? 'Да' : state.screening.olderCase === 'no' ? 'Нет' : '—'}\n`;
          } else {
            txt += `A: ${exportedAnswers[q.id] || '—'}\n`;
          }
        });

        return txt;
      };

      const exportJSON = () => {
        const data = JSON.stringify(buildReportObject(), null, 2);
        downloadFile(makeFilename(`${track}_${state.meta.respondentCode}`, state.meta.date, 'json'), data, 'application/json');
      };

      const exportTXT = () => {
        const data = buildReportText();
        downloadFile(makeFilename(`${track}_${state.meta.respondentCode}`, state.meta.date, 'txt'), data, 'text/plain');
      };

      const copyTXT = async () => {
        try {
          await navigator.clipboard.writeText(buildReportText());
          setCopyStatus('Скопировано!');
          setTimeout(() => setCopyStatus(''), 2000);
        } catch (err) {
          alert('Не удалось скопировать текст');
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800">
          
          {showSavedBanner && (
            <SavedDataBanner
              savedMeta={state.meta}
              onContinue={() => setShowSavedBanner(false)}
              onNewInterview={() => setShowResetModal(true)}
            />
          )}

          {/* Header */}
          <header className="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
            <div className="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
              <div className="flex items-center gap-3">
                <div className={`rounded-lg p-2 text-white ${track === 'b2s' ? 'bg-emerald-600' : 'bg-blue-600'}`}>
                  <IconFileText size={20} />
                </div>
                <div>
                  <h1 className="text-lg font-bold leading-tight">{config.project} CustDev Tool</h1>
                  <p className="text-xs font-medium text-slate-500">{config.icon} {config.label}</p>
                </div>
              </div>

              <div className="flex flex-wrap items-center justify-end gap-2">
                <span className="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600 hidden sm:inline-block">
                  Прогресс: {stats.percent}%
                </span>
                <span className="rounded-full bg-emerald-50 px-3 py-1 text-xs font-medium text-emerald-700 hidden md:inline-block">
                  {saveStatus}
                </span>
                <button
                  onClick={() => setShowResetModal(true)}
                  title="Начать новое интервью"
                  className="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
                >
                  <IconPlus size={16} />
                  <span className="hidden sm:inline">Новое</span>
                </button>
                <button
                  onClick={copyTXT}
                  className="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-800"
                >
                  {copyStatus ? <IconCheck size={16} className="text-emerald-400" /> : <IconCopy size={16} />}
                  <span className="hidden sm:inline">{copyStatus || 'Скопировать'}</span>
                </button>
              </div>
            </div>
          </header>

          {/* Main Layout */}
          <main className="mx-auto flex max-w-7xl flex-col gap-8 px-4 py-8 sm:px-6 lg:flex-row lg:px-8">
            
            {/* Sidebar */}
            <aside className="w-full space-y-6 lg:sticky lg:top-24 lg:w-[360px] lg:self-start lg:max-h-[calc(100vh-7rem)] lg:overflow-y-auto order-2 lg:order-1">
              <Card>
                <h3 className="mb-3 flex items-center gap-2 text-base font-semibold text-slate-900">
                  <IconInfo size={18} className="text-blue-600" />
                  Цель исследования
                </h3>
                <p className="text-sm leading-relaxed text-slate-600">{config.objective}</p>
              </Card>



              <Card>
                <h3 className="mb-3 flex items-center gap-2 text-base font-semibold text-slate-900">
                  <IconAlert size={18} className="text-red-500" />
                  Правила интервьюера
                </h3>
                <ul className="space-y-2 text-sm text-slate-600">
                  {config.interviewerRules.map((rule, idx) => (
                    <li key={idx} className="flex items-start gap-2">
                      <span className="mt-1 text-red-400">•</span>
                      <span>{rule}</span>
                    </li>
                  ))}

              <Card>
                <h3 className="mb-3 flex items-center gap-2 text-base font-semibold text-slate-900">
                  <IconLightbulb size={18} className="text-blue-600" />
                  Как копать глубже
                </h3>
                <ul className="space-y-2 text-sm text-slate-600">
                  {config.followUpPrompts.map((item, idx) => (
                    <li key={idx} className="rounded-lg bg-slate-50 px-3 py-2">
                      {item}

                  ))}
                </ul>
              </Card>

              <Card>
                <h3 className="mb-3 flex items-center gap-2 text-base font-semibold text-slate-900">
                  <IconDatabase size={18} className="text-emerald-600" />
                  Качество фиксации

                <div className="space-y-2 text-sm text-slate-600">
                  <p>Хорошее = есть реальный кейс, зафиксирован сбой процесса и есть хотя бы одна сильная цитата.</p>
                  <p>Плохое = общие рассуждения без конкретного примера.</p>

            {/* Content Form Sections */}
            <div className="min-w-0 flex-1 space-y-8 order-1 lg:order-2">
               
              {/* Метаданные */}
              <section id="meta">
                <div className="mb-4 flex items-center gap-2">
                  <SectionBadge color="slate">Данные</SectionBadge>
                  <h2 className="text-xl font-bold">Организация интервью</h2>
                </div>
                <Card>
                  {/* Переключатель треков */}
                  <div className="mb-6 pb-6 border-b border-slate-100">
                    <label className="mb-2 block text-sm font-medium text-slate-800">Трек исследования</label>
                    <div className="flex gap-2">
                      {Object.values(SURVEY_CONFIGS).map(cfg => (
                        <button
                          key={cfg.key}
                          type="button"
                          onClick={() => handleTrackSwitch(cfg.key)}
                          className={`flex-1 rounded-lg border px-4 py-2.5 text-sm font-medium transition ${
                            track === cfg.key
                              ? (cfg.key === 'b2s' ? 'border-emerald-600 bg-emerald-600 text-white' : 'border-blue-600 bg-blue-600 text-white')
                              : 'border-slate-300 bg-white text-slate-700 hover:border-slate-400'

                          {cfg.icon} {cfg.label}

                      ))}
                    </div>
                  </div>

                  <div className="grid gap-6 sm:grid-cols-2">
                    <InputField
                      label="Код респондента *"
                      value={state.meta.respondentCode}
                      onChange={v => updateMeta('respondentCode', v)}
                      placeholder="Например: R-01"
                    />
                    <InputField
                      label="Интервьюер"
                      value={state.meta.interviewer}

                      type="date"

                    />
                    {/* Доп. поля для B2S */}
                    {config.extraMetaFields.map(f => (
                      <InputField
                        key={f.key}
                        label={f.label}
                        value={state.meta[f.key] || ''}
                        onChange={v => updateMeta(f.key, v)}
                        placeholder={f.placeholder}
                      />

                  </div>
                  <div className="mt-6 flex flex-col gap-3 pt-6 border-t border-slate-100">
                    <label className="flex items-center gap-3 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={state.meta.audioRecorded}
                        onChange={e => updateMeta('audioRecorded', e.target.checked)}
                        className="h-5 w-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500"
                      />
                      <span className="text-sm font-medium text-slate-700">Велась аудиозапись</span>
                    </label>
                  </div>
                </Card>
              </section>

              {/* Краткая квалификация */}
              <section id="qualification">
                <div className="mb-4 flex items-center gap-2">
                  <SectionBadge color="blue">Этап 1</SectionBadge>
                  <h2 className="text-xl font-bold">Квалификация респондента</h2>
                </div>
                <Card>
                  <div className="space-y-6">
                    <TextareaField
                      label="Абстракт / Кто это в одном предложении? *"
                      value={state.summary.caseOneLiner}
                      onChange={v => updateSummary('caseOneLiner', v)}
                      placeholder={track === 'b2s'
                        ? 'Например: CTO стартапа в области AgriTech, ищет эксперта по микробиологии почв для нового продукта.'
                        : 'Например: Постдок-биолог, работает над грантом по анализу свойств биоматериалов, делает это в одиночку.'
                      }
                      rows={2}
                    />
                  </div>
                </Card>
              </section>

              {/* Интервью вопросы */}
              <section id="interview" className="space-y-6">
                <div className="mb-4 flex items-center gap-2">
                  <SectionBadge color="amber">Этап 2</SectionBadge>
                  <h2 className="text-xl font-bold">Раскопка опыта</h2>
                </div>
                
                {groupedQuestions.interview.map((q) => (
                  <Card key={q.id} className={q.stage === 'fallback' ? 'border-amber-300 bg-amber-50/30' : ''}>
                    <div className="mb-4 border-b border-slate-100 pb-4">
                      <div className="mb-2 flex items-center gap-2">
                        <span className="rounded bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-500">
                          {q.id}
                        </span>
                        {q.required && <span className="text-red-500">*</span>}
                        {q.stage === 'fallback' && <span className="rounded bg-amber-100 px-2 py-0.5 text-xs font-bold text-amber-700">Запасная гипотеза</span>}
                      </div>
                      <h3 className="text-base font-bold text-slate-900 leading-snug">{q.question}</h3>
                      <p className="mt-2 text-sm text-slate-500">Цель: {q.goal}</p>
                    </div>
                    
                    {q.type === 'caseFilter' ? (
                      <div className="flex gap-3">
                        <ToggleButton value="yes" active={state.screening.caseLastYear === 'yes'} onClick={v => updateScreening('caseLastYear', v)}>Да, был кейс</ToggleButton>
                        <ToggleButton value="no" active={state.screening.caseLastYear === 'no'} onClick={v => updateScreening('caseLastYear', v)} activeClass="border-slate-800 bg-slate-800 text-white">Нет, кейсов не было</ToggleButton>
                      </div>
                    ) : q.type === 'olderCaseFilter' ? (
                      <div className="flex gap-3">
                        <ToggleButton value="yes" active={state.screening.olderCase === 'yes'} onClick={v => updateScreening('olderCase', v)} activeClass="border-amber-600 bg-amber-600 text-white">Да, помню старый кейс</ToggleButton>
                        <ToggleButton value="no" active={state.screening.olderCase === 'no'} onClick={v => updateScreening('olderCase', v)} activeClass="border-slate-800 bg-slate-800 text-white">Вообще никаких кейсов</ToggleButton>
                      </div>
                    ) : (
                      <TextareaField
                        label="Ответ"
                        value={state.answers[q.id] || ''}
                        onChange={v => updateAnswer(q.id, v)}
                        placeholder="Зафиксируйте ответ..."
                      />
                    )}
                  </Card>
                ))}
              </section>

              {/* Проверка концепции */}
              <section id="concept" className="space-y-6">
                <div className="mb-4 flex items-center gap-2">
                  <SectionBadge color="emerald">Этап 3</SectionBadge>
                  <h2 className="text-xl font-bold">Проверка концепции</h2>
                </div>
                {groupedQuestions.concept.map((q) => (
                  <Card key={q.id}>
                    <div className="mb-4 border-b border-slate-100 pb-4">
                      <div className="mb-2 flex items-center gap-2">
                        <span className="rounded bg-emerald-100 px-2 py-0.5 text-xs font-bold text-emerald-700">
                          {q.id}
                        </span>
                        {q.required && <span className="text-red-500">*</span>}
                      </div>
                      <h3 className="text-base font-bold text-slate-900 leading-snug">{q.question}</h3>
                      <p className="mt-2 text-sm text-slate-500">Цель: {q.goal}</p>
                    </div>
                    <TextareaField
                      label="Ответ"
                      value={state.answers[q.id] || ''}
                      onChange={v => updateAnswer(q.id, v)}
                      placeholder="Зафиксируйте реакцию..."
                    />
                  </Card>
                ))}
              </section>

              {/* Пост-интервью резюме */}
              <section id="summary" className="space-y-6">
                <div className="mb-4 flex items-center gap-2">
                  <SectionBadge color="violet">Финал</SectionBadge>
                  <h2 className="text-xl font-bold">Оценка и выводы (заполняется после)</h2>
                </div>
                
                <Card className="space-y-8 bg-violet-50/30 border-violet-100">
                  
                  <div className="grid gap-6 md:grid-cols-2">
                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-800">Ключевая боль *</label>
                      <textarea
                        rows={3}
                        value={state.summary.mainPain}
                        onChange={e => updateSummary('mainPain', e.target.value)}
                        placeholder="Какая главная сложность прозвучала?"
                        className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                      />
                    </div>
                    <div>
                      <label className="mb-2 block text-sm font-medium text-slate-800">Главный инсайт *</label>
                      <textarea
                        rows={3}
                        value={state.summary.mainInsight}
                        onChange={e => updateSummary('mainInsight', e.target.value)}
                        placeholder="Что вас удивило или разрушило гипотезу?"
                        className="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                      />
                    </div>
                  </div>

                  <TextareaField
                    label="Сильные цитаты (дословно)"
                    value={state.summary.strongQuotes}
                    onChange={v => updateSummary('strongQuotes', v)}
                    placeholder="«Я потратил 2 месяца, чтобы просто найти кому написать...»"
                    rows={3}
                  />

                  <div className="grid gap-6 md:grid-cols-2 pt-6 border-t border-violet-100">
                    <div>
                      <label className="mb-3 block text-sm font-medium text-slate-800">Где ломается процесс? *</label>
                      <div className="flex flex-wrap gap-2">
                        {config.breakpoints.map(b => (
                          <ToggleButton key={b} value={b} active={state.summary.breakpoint === b} onClick={v => updateSummary('breakpoint', v === state.summary.breakpoint ? '' : v)} activeClass="border-blue-600 bg-blue-600 text-white">
                            {b}
                          </ToggleButton>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="mb-3 block text-sm font-medium text-slate-800">Качество интервью *</label>
                      <div className="flex flex-wrap gap-2">
                        {QUALITY_OPTIONS.map(q => (
                          <ToggleButton key={q} value={q} active={state.summary.interviewQuality === q} onClick={v => updateSummary('interviewQuality', v === state.summary.interviewQuality ? '' : v)} activeClass="border-emerald-600 bg-emerald-600 text-white">
                            {q}
                          </ToggleButton>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div>
                    <label className="mb-3 block text-sm font-medium text-slate-800">Теги болей (можно несколько)</label>
                    <div className="flex flex-wrap gap-2">
                      {config.painTags.map(tag => (
                        <ToggleButton
                          key={tag}
                          value={tag}
                          active={state.summary.painTags.includes(tag)}
                          onClick={v => updateSummary('painTags', toggleArrayValue(state.summary.painTags, v))}
                          activeClass="border-violet-600 bg-violet-600 text-white"
                        >
                          {tag}
                        </ToggleButton>
                      ))}
                    </div>
                  </div>

                </Card>
              </section>

              {/* Действия снизу */}
              <div className="mt-12 flex flex-wrap gap-4 pb-12">
                <button
                  onClick={exportTXT}
                  className="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-6 py-3 text-sm font-medium text-white transition hover:bg-blue-700"
                >
                  <IconFileText size={18} /> Скачать TXT
                </button>
                <button
                  onClick={exportJSON}
                  className="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-6 py-3 text-sm font-medium text-white transition hover:bg-emerald-700"
                >
                  <IconDownload size={18} /> Скачать JSON
                </button>
                <button
                  onClick={() => setShowResetModal(true)}
                  className="ml-auto inline-flex items-center gap-2 rounded-lg border border-red-200 text-red-600 px-6 py-3 text-sm font-medium transition hover:bg-red-50"
                >
                  <IconReset size={18} /> Очистить всё
                </button>
              </div>

            </div>
          </main>

          <ConfirmModal
            isOpen={showResetModal}
            title="Очистить форму?"
            message="Все данные текущего интервью будут удалены. Это действие нельзя отменить."
            confirmLabel="Да, очистить"
            onConfirm={handleResetForm}
            onCancel={() => setShowResetModal(false)}
          />

          <ConfirmModal
            isOpen={showTrackModal !== null}
            title="Сменить трек?"
            message={`Текущие данные будут сохранены. Вы переключитесь на трек «${showTrackModal ? SURVEY_CONFIGS[showTrackModal].label : ''}».`}
            confirmLabel="Да, переключить"
            confirmColor="blue"
            onConfirm={() => doTrackSwitch(showTrackModal)}
            onCancel={() => setShowTrackModal(null)}
          />

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>

</body>
</html>
